name: Refresh trend data

on:
  schedule:
    - cron: "23 19 * * *"  # UTC 19:23 = KST 04:23
  workflow_dispatch:
    inputs:
      mode:
        description: '수집 모드 (preset=프리셋 니치, channel=채널 URL 입력, search=검색어 입력)'
        type: choice
        options: [preset, channel, search]
        default: preset
      preset_slug:
        description: '프리셋 니치 slug (mode=preset). 예: emotional-vlog'
        default: emotional-vlog
      niche_name:
        description: '새 니치명 (mode=channel/search). 표시용 + 슬러그 생성'
      channel_urls:
        description: '채널 URL 또는 @handle (mode=channel). 한 줄에 하나'
      search_keyword:
        description: '검색어 (mode=search). ytsearch — 오토픽 혼입 가능'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt && pip install yt-dlp

      - name: Run pipeline
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ACR_ACCESS_KEY: ${{ secrets.ACR_ACCESS_KEY }}
          ACR_ACCESS_SECRET: ${{ secrets.ACR_ACCESS_SECRET }}
          ACR_HOST: ${{ secrets.ACR_HOST }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 온디맨드 니치 (mode != preset 일 때만 값 할당)
          NICHE_SLUG: ${{ inputs.mode == 'preset' && inputs.preset_slug || '' }}
          NICHE_NAME: ${{ inputs.mode != 'preset' && inputs.niche_name || '' }}
          CHANNELS_RAW: ${{ inputs.mode == 'channel' && inputs.channel_urls || '' }}
          SEARCH_KEYWORD: ${{ inputs.mode == 'search' && inputs.search_keyword || '' }}
        run: python run.py

      - name: Commit & push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          MODE="${{ inputs.mode || 'auto' }}"
          NICHE="${{ inputs.niche_name || inputs.preset_slug || 'emotional-vlog' }}"
          git diff --staged --quiet || git commit -m "chore(data): ${MODE} ${NICHE} 갱신 $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
